Resources:
  FilePublishingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action: sts:TagSession
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
        - Action:
          - sts:AssumeRole
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action:
          - sts:TagSession
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
      RoleName: !Sub cdk-hnb659fds-file-publishing-role-${AWS::AccountId}-${AWS::Region}
      Tags:
      - Key: aws-cdk:bootstrap-role
        Value: file-publishing
  ImagePublishingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action: sts:TagSession
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
        - Action:
          - sts:AssumeRole
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action:
          - sts:TagSession
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
      RoleName: !Sub cdk-hnb659fds-image-publishing-role-${AWS::AccountId}-${AWS::Region}
      Tags:
      - Key: aws-cdk:bootstrap-role
        Value: image-publishing
  LookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action: sts:TagSession
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
        - Action:
          - sts:AssumeRole
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action:
          - sts:TagSession
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
      RoleName: !Sub cdk-hnb659fds-lookup-role-${AWS::AccountId}-${AWS::Region}
      ManagedPolicyArns:
      - !Sub arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess
      Policies:
      - PolicyDocument:
          Statement:
          - Sid: DontReadSecrets
            Effect: Deny
            Action:
            - kms:Decrypt
            Resource: "*"
          Version: '2012-10-17'
        PolicyName: LookupRolePolicy
      Tags:
      - Key: aws-cdk:bootstrap-role
        Value: lookup
  DeploymentActionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action: sts:TagSession
          Effect: Allow
          Principal:
            AWS: !Sub ${AWS::AccountId}
        - Action:
          - sts:AssumeRole
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
          Condition:
            'Null':
              sts:ExternalId: 'true'
        - Action:
          - sts:TagSession
          Effect: Allow
          Principal:
            AWS:
            - !Sub ${AWS::AccountId}
      Policies:
      - PolicyDocument:
          Statement:
          - Sid: CloudFormationPermissions
            Effect: Allow
            Action:
            - cloudformation:CreateChangeSet
            - cloudformation:DeleteChangeSet
            - cloudformation:DescribeChangeSet
            - cloudformation:DescribeStacks
            - cloudformation:DescribeEvents
            - cloudformation:ExecuteChangeSet
            - cloudformation:CreateStack
            - cloudformation:UpdateStack
            - cloudformation:RollbackStack
            - cloudformation:ContinueUpdateRollback
            Resource: "*"
          - Sid: PipelineCrossAccountArtifactsBucket
            Effect: Allow
            Action:
            - s3:GetObject*
            - s3:GetBucket*
            - s3:List*
            - s3:Abort*
            - s3:DeleteObject*
            - s3:PutObject*
            Resource: "*"
            Condition:
              StringNotEquals:
                s3:ResourceAccount: !Sub ${AWS::AccountId}
          - Sid: PipelineCrossAccountArtifactsKey
            Effect: Allow
            Action:
            - kms:Decrypt
            - kms:DescribeKey
            - kms:Encrypt
            - kms:ReEncrypt*
            - kms:GenerateDataKey*
            Resource: "*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub s3.${AWS::Region}.amazonaws.com
          - Action: iam:PassRole
            Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/cdk-hnb659fds-cfn-exec-role-${AWS::AccountId}-${AWS::Region}
            Effect: Allow
          - Sid: CliPermissions
            Action:
            - cloudformation:DescribeStackEvents
            - cloudformation:GetTemplate
            - cloudformation:DeleteStack
            - cloudformation:UpdateTerminationProtection
            - sts:GetCallerIdentity
            - cloudformation:GetTemplateSummary
            - cloudformation:GetHookResult
            Resource: "*"
            Effect: Allow
          - Sid: CliStagingBucket
            Effect: Allow
            Action:
            - s3:GetObject*
            - s3:GetBucket*
            - s3:List*
            Resource:
            - !Sub arn:${AWS::Partition}:s3:::cdk-hnb659fds-assets-${AWS::AccountId}-${AWS::Region}
            - !Sub arn:${AWS::Partition}:s3:::cdk-hnb659fds-assets-${AWS::AccountId}-${AWS::Region}/*
          - Sid: ReadVersion
            Effect: Allow
            Action:
            - ssm:GetParameter
            - ssm:GetParameters
            Resource:
            - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cdk-bootstrap/hnb659fds/version
          - Sid: Refactor
            Effect: Allow
            Action:
            - cloudformation:CreateStackRefactor
            - cloudformation:DescribeStackRefactor
            - cloudformation:ExecuteStackRefactor
            - cloudformation:ListStackRefactorActions
            - cloudformation:ListStackRefactors
            - cloudformation:ListStacks
            Resource: "*"
          Version: '2012-10-17'
        PolicyName: default
      RoleName: !Sub cdk-hnb659fds-deploy-role-${AWS::AccountId}-${AWS::Region}
      Tags:
      - Key: aws-cdk:bootstrap-role
        Value: deploy
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
        - Action: sts:AssumeRole
          Effect: Allow
          Principal:
            Service: cloudformation.amazonaws.com
        Version: '2012-10-17'
      ManagedPolicyArns:
      - !Sub arn:${AWS::Partition}:iam::aws:policy/AdministratorAccess
      # - !Sub arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess
      # - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:policy/CustomCloudFormationExecutionPolicy
      RoleName: !Sub cdk-hnb659fds-cfn-exec-role-${AWS::AccountId}-${AWS::Region}
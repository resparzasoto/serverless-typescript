Resources:
  CountriesDynamoDBTable:
    Type: AWS::DynamoDB::GlobalTable
    Properties:
      TableName: Countries
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Replicas:
      - Region: us-east-1
      - Region: us-west-2
      AttributeDefinitions:
      - AttributeName: id
        AttributeType: S
      KeySchema:
      - AttributeName: id
        KeyType: HASH
      SSESpecification:
        SSEEnabled: true
Resources:
  FilePublishingRoleDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
        - Action:
          - s3:GetObject*
          - s3:GetBucket*
          - s3:GetEncryptionConfiguration
          - s3:List*
          - s3:DeleteObject*
          - s3:PutObject*
          - s3:Abort*
          Resource:
          - !Sub arn:${AWS::Partition}:s3:::cdk-hnb659fds-assets-${AWS::AccountId}-${AWS::Region}
          - !Sub arn:${AWS::Partition}:s3:::cdk-hnb659fds-assets-${AWS::AccountId}-${AWS::Region}/*
          Condition:
            StringEquals:
              aws:ResourceAccount:
              - !Ref AWS::AccountId
          Effect: Allow
        - Action:
          - kms:Decrypt
          - kms:DescribeKey
          - kms:Encrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey*
          Effect: Allow
          Resource:
            - !Sub arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*
        Version: '2012-10-17'
      Roles:
      - !Sub cdk-hnb659fds-file-publishing-role-${AWS::AccountId}-${AWS::Region}
      PolicyName: !Sub cdk-hnb659fds-file-publishing-role-default-policy-${AWS::AccountId}-${AWS::Region}
  ImagePublishingRoleDefaultPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
        - Action:
          - ecr:PutImage
          - ecr:InitiateLayerUpload
          - ecr:UploadLayerPart
          - ecr:CompleteLayerUpload
          - ecr:BatchCheckLayerAvailability
          - ecr:DescribeRepositories
          - ecr:DescribeImages
          - ecr:BatchGetImage
          - ecr:GetDownloadUrlForLayer
          Resource: !Sub arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/cdk-hnb659fds-container-assets-${AWS::AccountId}-${AWS::Region}
          Effect: Allow
        - Action:
          - ecr:GetAuthorizationToken
          Resource: "*"
          Effect: Allow
        Version: '2012-10-17'
      Roles:
      - !Sub cdk-hnb659fds-image-publishing-role-${AWS::AccountId}-${AWS::Region}
      PolicyName: !Sub cdk-hnb659fds-image-publishing-role-default-policy-${AWS::AccountId}-${AWS::Region}
